name: Deploy Backend to Production

on:
  push:
    branches:
      - main  # main 브랜치에 push 시 자동 배포
  workflow_dispatch:  # 수동 실행 가능

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # ========================================
      # 1. 코드 체크아웃
      # ========================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ========================================
      # 2. JDK 21 설치
      # ========================================
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # ========================================
      # 3. Gradle 빌드 (테스트 스킵)
      # ========================================
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test --no-daemon

      # ========================================
      # 4. Docker 로그인
      # ========================================
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ========================================
      # 5. Docker 이미지 빌드 & 푸시
      # ========================================
      - name: Build and Push Docker Image
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/yamoyo-api:prod"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      # ========================================
      # 6. 서버 배포 (self-hosted runner이므로 직접 실행)
      # ========================================
      - name: Deploy to Server
        run: |
          set -e
          cp docker-compose.prod.yml /srv/yamoyo/docker-compose.prod.yml
          cd /srv/yamoyo
          docker compose -f docker-compose.prod.yml pull backend
          docker compose -f docker-compose.prod.yml up -d backend

          echo "Waiting for backend to start..."
          sleep 10
          docker compose -f docker-compose.prod.yml ps
          docker compose -f docker-compose.prod.yml logs --tail=50 backend

          docker image prune -f

      # ========================================
      # 7. 배포 완료 알림
      # ========================================
      - name: Notify deployment success
        if: success()
        run: echo "✅ Backend deployment completed successfully!"

      - name: Notify deployment failure
        if: failure()
        run: echo "❌ Backend deployment failed!"